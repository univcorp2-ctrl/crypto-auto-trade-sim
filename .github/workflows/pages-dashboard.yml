name: Public Performance Dashboard

on:
  push:
    branches: [main]
  schedule:
    # 09:30 JST every day. GitHub cron uses UTC.
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      reset_state:
        description: "Reset the 1,000,000 JPY hypothetical portfolio from current prices"
        required: false
        default: "false"
      initial_investment_jpy:
        description: "Initial hypothetical investment amount in JPY"
        required: false
        default: "1000000"

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

concurrency:
  group: pages-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate latest dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PORTFOLIO_RESET_STATE: ${{ github.event.inputs.reset_state || 'false' }}
          INITIAL_INVESTMENT_JPY: ${{ github.event.inputs.initial_investment_jpy || vars.INITIAL_INVESTMENT_JPY || '1000000' }}
          EXCHANGE_REST_BASE: ${{ vars.EXCHANGE_REST_BASE || 'https://api.binance.com' }}
          PERFORMANCE_WEBHOOK_URL: ${{ secrets.PERFORMANCE_WEBHOOK_URL }}
          REPORT_TIME_ZONE: Asia/Tokyo
          PUBLIC_DASHBOARD_URL: https://univcorp2-ctrl.github.io/crypto-auto-trade-sim/
        run: npm run generate:dashboard

      - name: Build dashboard
        env:
          VITE_BASE_PATH: /crypto-auto-trade-sim/
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
