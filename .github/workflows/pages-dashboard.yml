name: Deploy Web App to GitHub Pages
on: { push: { branches: [main] }, schedule: [ { cron: '30 0 * * *' } ], workflow_dispatch: {} }
permissions: { contents: read, pages: write, id-token: write }
env: { PUBLIC_DASHBOARD_URL: 'https://univcorp2-ctrl.github.io/crypto-auto-trade-sim/', VITE_BASE_PATH: '/crypto-auto-trade-sim/', ENABLE_LIVE_TRADING: 'false', TRADING_DRY_RUN: 'true' }
concurrency: { group: pages, cancel-in-progress: true }
jobs: { build: { runs-on: ubuntu-latest, steps: [ { name: Checkout, uses: actions/checkout@v4 }, { name: Setup Node.js, uses: actions/setup-node@v4, with: { node-version: 22 } }, { name: Install dependencies, run: 'npm install' }, { name: Generate dashboard data, run: 'npm run generate:dashboard' }, { name: Test, run: 'npm test' }, { name: Build Vite app, run: 'npm run build' }, { name: Configure GitHub Pages, uses: actions/configure-pages@v5 }, { name: Upload Pages artifact, uses: actions/upload-pages-artifact@v3, with: { path: dist } } ] }, deploy: { needs: build, runs-on: ubuntu-latest, environment: { name: github-pages, url: '${{ steps.deployment.outputs.page_url }}' }, steps: [ { name: Deploy to GitHub Pages, id: deployment, uses: actions/deploy-pages@v4 } ] } }
